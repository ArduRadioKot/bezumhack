<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>LUXARY — Авторизация</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }

      :root {
        --bg-primary: #faf9f7;
        --bg-secondary: #ffffff;
        --text-primary: #1e1e2a;
        --text-secondary: #5a5a6e;
        --accent: #c9a03d;
        --accent-dark: #a87c2c;
        --border: rgba(0, 0, 0, 0.08);
        --shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
        --glass-bg: rgba(255, 255, 255, 0.65);
        --glass-border: 1px solid rgba(255, 255, 255, 0.3);
        --input-bg: #fff;
      }

      body.dark {
        --bg-primary: #0a0a0f;
        --bg-secondary: #13131a;
        --text-primary: #f0f0f0;
        --text-secondary: #b0b0c0;
        --accent: #e6b422;
        --accent-dark: #c9991e;
        --border: rgba(255, 255, 255, 0.1);
        --shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.5);
        --glass-bg: rgba(10, 10, 20, 0.7);
        --glass-border: 1px solid rgba(230, 180, 34, 0.2);
        --input-bg: #1e1e2a;
      }

      body {
        font-family: "Montserrat", sans-serif;
        background-color: var(--bg-primary);
        color: var(--text-primary);
        line-height: 1.5;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 100;
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        border-bottom: var(--glass-border);
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
      }

      .logo {
        font-family: "Playfair Display", serif;
        font-size: 1.8rem;
        font-weight: 700;
        color: var(--accent);
        text-decoration: none;
      }

      .theme-toggle {
        background: none;
        border: none;
        font-size: 1.4rem;
        cursor: pointer;
        color: var(--accent);
      }

      .container {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .auth-card {
        background: var(--bg-secondary);
        border-radius: 32px;
        box-shadow: var(--shadow);
        width: 100%;
        max-width: 500px;
        overflow: hidden;
        backdrop-filter: blur(4px);
      }

      .tabs {
        display: flex;
        border-bottom: 1px solid var(--border);
      }

      .tab-btn {
        flex: 1;
        background: none;
        border: none;
        padding: 1.2rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        color: var(--text-secondary);
      }

      .tab-btn.active {
        color: var(--accent);
        border-bottom: 2px solid var(--accent);
      }

      .form-pane {
        padding: 2rem;
        display: none;
        animation: fadeIn 0.3s ease;
      }

      .form-pane.active {
        display: block;
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
      }

      .form-group input {
        width: 100%;
        padding: 12px 16px;
        border-radius: 40px;
        border: 1px solid var(--border);
        background: var(--input-bg);
        color: var(--text-primary);
        font-size: 1rem;
        outline: none;
      }

      .form-group input:focus {
        border-color: var(--accent);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: linear-gradient(135deg, var(--accent), var(--accent-dark));
        color: #111;
        padding: 12px 24px;
        border-radius: 40px;
        font-weight: 600;
        border: none;
        cursor: pointer;
        width: 100%;
        font-size: 1rem;
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(201, 160, 61, 0.3);
      }

      .btn-subtle {
        background: var(--bg-secondary);
        color: var(--accent);
        border: 1px solid var(--accent);
        box-shadow: none;
      }

      .btn-subtle:hover {
        background: rgba(201, 160, 61, 0.08);
        color: var(--accent);
        box-shadow: none;
      }

      body.dark .btn-subtle {
        background: var(--bg-secondary);
        color: var(--accent);
        border: 1px solid var(--accent);
      }

      .btn-ghost {
        margin-top: 0.75rem;
        background: transparent;
        color: var(--accent);
        border: none;
        box-shadow: none;
      }

      .btn-ghost:hover {
        background: transparent;
        color: var(--accent-dark);
        transform: none;
        box-shadow: none;
      }

      .message {
        margin-top: 1rem;
        padding: 0.75rem;
        border-radius: 18px;
        text-align: center;
        font-size: 0.9rem;
        display: none;
      }

      .message.error {
        display: block;
        background: rgba(231, 76, 60, 0.1);
        color: #e74c3c;
      }

      .message.success {
        display: block;
        background: rgba(46, 204, 113, 0.1);
        color: #2ecc71;
      }

      .message.info {
        display: block;
        background: rgba(201, 160, 61, 0.12);
        color: var(--accent-dark);
      }

      .profile-info {
        text-align: center;
        padding: 2rem;
      }

      .avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: var(--accent);
        margin: 0 auto 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        color: white;
      }

      .profile-name {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
      }

      .profile-email {
        color: var(--text-secondary);
        margin-bottom: 0.5rem;
      }

      .profile-balance {
        font-size: 1.3rem;
        font-weight: 600;
        color: var(--accent);
        margin: 1rem 0;
      }

      .profile-role {
        font-size: 0.85rem;
        background: var(--accent);
        color: #111;
        display: inline-block;
        padding: 0.2rem 0.8rem;
        border-radius: 40px;
        margin-top: 0.5rem;
      }
      .profile-address {
        color: var(--text-secondary);
        margin-bottom: 0.5rem;
        font-size: 0.95rem;
      }

      .action-stack {
        display: flex;
        flex-direction: column;
        gap: 0.85rem;
        margin-top: 1rem;
      }

      footer {
        background: var(--glass-bg);
        backdrop-filter: blur(8px);
        padding: 1.5rem;
        text-align: center;
        border-top: var(--glass-border);
        margin-top: auto;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 600px) {
        .container {
          padding: 1rem;
        }

        .form-pane {
          padding: 1.5rem;
        }

        .profile-info {
          padding: 1.5rem;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <a href="index.html" class="logo">LUXARY</a>
      <button class="theme-toggle" id="themeToggle">
        <i class="fas fa-moon"></i>
      </button>
    </header>

    <div class="container">
      <div class="auth-card" id="authCard">
        <div class="tabs">
          <button class="tab-btn active" data-tab="login">Вход</button>
          <button class="tab-btn" data-tab="register">Регистрация</button>
        </div>

        <div id="loginPane" class="form-pane active">
          <form id="loginForm">
            <div class="form-group">
              <label>Email</label>
              <input
                type="email"
                id="loginEmail"
                required
                placeholder="example@mail.com"
              />
            </div>
            <div class="form-group">
              <label>Пароль</label>
              <input
                type="password"
                id="loginPassword"
                required
                placeholder="••••••"
              />
            </div>
            <button type="submit" class="btn btn-subtle">Войти</button>
            <button type="button" class="btn btn-ghost" id="guestLoginBtn">
              Войти как гость
            </button>
            <div id="loginMessage" class="message"></div>
          </form>
        </div>

        <div id="registerPane" class="form-pane">
          <form id="registerForm">
            <div class="form-group">
              <label>Полное имя</label>
              <input
                type="text"
                id="regName"
                required
                placeholder="Иван Петров"
              />
            </div>
            <div class="form-group">
              <label>Email</label>
              <input
                type="email"
                id="regEmail"
                required
                placeholder="ivan@example.com"
              />
            </div>
            <div class="form-group">
              <label>Пароль</label>
              <input
                type="password"
                id="regPassword"
                required
                placeholder="минимум 6 символов"
              />
            </div>
            <div class="form-group">
              <label>Подтверждение пароля</label>
              <input
                type="password"
                id="regConfirmPassword"
                required
                placeholder="повторите пароль"
              />
            </div>
            <div class="form-group">
              <label>Адрес доставки</label>
              <input
                type="text"
                id="regAddress"
                required
                placeholder="Город, улица, дом, квартира"
              />
            </div>
            <button type="submit" class="btn">Зарегистрироваться</button>
            <div id="registerMessage" class="message"></div>
          </form>
        </div>
      </div>

      <div id="profileCard" class="auth-card" style="display: none">
        <div class="profile-info">
          <div class="avatar"><i class="fas fa-user"></i></div>
          <div class="profile-name" id="profileName"></div>
          <div class="profile-email" id="profileEmail"></div>
          <div class="profile-address" id="profileAddress"></div>
          <div class="profile-balance" id="profileBalance"></div>
          <div
            class="profile-role"
            id="profileRole"
            style="display: none"
          ></div>

          <div class="action-stack">
            <button
              id="topupBalanceBtn"
              class="btn"
              style="
                background: transparent;
                border: 1px solid var(--accent);
                color: var(--accent);
              "
            >
              Пополнить баланс
            </button>
            <button id="goToShopBtn" class="btn">Перейти в магазин</button>
            <button
              id="editProfileBtn"
              class="btn"
              style="
                background: transparent;
                border: 1px solid var(--accent);
                color: var(--accent);
              "
            >
              Редактировать профиль
            </button>
            <button id="logoutBtn" class="btn">Выйти</button>
          </div>
        </div>

        <div
          id="editForm"
          style="
            display: none;
            margin-top: 1rem;
            padding: 1rem 2rem 2rem;
            border-top: 1px solid var(--border);
          "
        >
          <div class="form-group">
            <label>Имя</label>
            <input type="text" id="editName" />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="editEmail" />
          </div>
          <div class="form-group">
            <label>Новый пароль (оставьте пустым, если не менять)</label>
            <input type="password" id="editPassword" />
          </div>
          <div class="form-group">
            <label>Адрес доставки</label>
            <input
              type="text"
              id="editAddress"
              placeholder="Город, улица, дом, квартира"
            />
          </div>
          <div class="form-group">
            <label
              ><input type="checkbox" id="editNotifications" /> Получать
              уведомления</label
            >
          </div>
          <button id="saveProfileChangesBtn" class="btn">Сохранить</button>
          <button
            id="cancelEditBtn"
            type="button"
            class="btn-subtle"
            style="margin-top: 0.75rem; width: 100%"
          >
            Отмена
          </button>
        </div>
      </div>
    </div>

    <footer>
      <p>© 2025 Luxary — Премиальный маркетплейс</p>
    </footer>

    <script>
      const CURRENT_USER_KEY = "luxary_current_user";
      const THEME_KEY = "luxary_theme";
      const API_BASE = "";

      const USER_MODE = {
        AUTH: "auth",
        GUEST: "guest",
      };

      // ========== Работа с пользователями ==========
      function initUsers() {}

      function getCurrentUser() {
        const raw = localStorage.getItem(CURRENT_USER_KEY);
        return raw ? JSON.parse(raw) : null;
      }

      function setCurrentUser(user) {
        if (user) localStorage.setItem(CURRENT_USER_KEY, JSON.stringify(user));
        else localStorage.removeItem(CURRENT_USER_KEY);
      }

      function isGuestUser(user = getCurrentUser()) {
        return !!user && user.mode === USER_MODE.GUEST;
      }

      function createGuestSession() {
        return {
          id: "guest-session",
          mode: USER_MODE.GUEST,
          name: "Гость",
          createdAt: new Date().toISOString(),
        };
      }

      // ========== UI элементы ==========
      const authCard = document.getElementById("authCard");
      const profileCard = document.getElementById("profileCard");
      const loginPane = document.getElementById("loginPane");
      const registerPane = document.getElementById("registerPane");
      const tabBtns = document.querySelectorAll(".tab-btn");
      const loginForm = document.getElementById("loginForm");
      const registerForm = document.getElementById("registerForm");
      const loginMessage = document.getElementById("loginMessage");
      const registerMessage = document.getElementById("registerMessage");
      const editProfileBtn = document.getElementById("editProfileBtn");
      const logoutBtn = document.getElementById("logoutBtn");
      const editForm = document.getElementById("editForm");
      const saveProfileChangesBtn = document.getElementById(
        "saveProfileChangesBtn",
      );
      const cancelEditBtn = document.getElementById("cancelEditBtn");
      const profileNameSpan = document.getElementById("profileName");
      const profileEmailSpan = document.getElementById("profileEmail");
      const profileAddressSpan = document.getElementById("profileAddress");
      const profileBalanceSpan = document.getElementById("profileBalance");
      const profileRoleSpan = document.getElementById("profileRole");
      const topupBalanceBtn = document.getElementById("topupBalanceBtn");
      const goToShopBtn = document.getElementById("goToShopBtn");
      const guestLoginBtn = document.getElementById("guestLoginBtn");
      const themeToggle = document.getElementById("themeToggle");

      // ========== Утилиты ==========
      function switchTab(tabId) {
        if (tabId === "login") {
          loginPane.classList.add("active");
          registerPane.classList.remove("active");
          tabBtns[0].classList.add("active");
          tabBtns[1].classList.remove("active");
        } else {
          registerPane.classList.add("active");
          loginPane.classList.remove("active");
          tabBtns[1].classList.add("active");
          tabBtns[0].classList.remove("active");
        }
        clearMessages();
      }

      function clearMessages() {
        [loginMessage, registerMessage].forEach((el) => {
          el.textContent = "";
          el.className = "message";
        });
      }

      function showMessage(element, text, type) {
        element.textContent = text;
        element.className = `message ${type}`;
        setTimeout(() => {
          if (element.textContent === text) {
            element.textContent = "";
            element.className = "message";
          }
        }, 3500);
      }

      function setGuestUIState(isGuest) {
        profileEmailSpan.style.display = isGuest ? "none" : "block";
        profileBalanceSpan.style.display = isGuest ? "none" : "block";
        profileRoleSpan.style.display = "none";
        topupBalanceBtn.style.display = isGuest ? "none" : "inline-flex";
        editProfileBtn.style.display = isGuest ? "none" : "inline-flex";

        if (isGuest) {
          editForm.style.display = "none";
        }
      }

      function showProfilePanel(user) {
        const guest = isGuestUser(user);

        authCard.style.display = "none";
        profileCard.style.display = "block";

        profileNameSpan.textContent = guest
          ? "Гостевой режим"
          : user.name || "Пользователь";
        profileEmailSpan.textContent = guest ? "" : user.email || "";
        profileAddressSpan.textContent = guest
          ? ""
          : user.shipping_address || "Адрес доставки не указан";
        profileBalanceSpan.textContent = guest
          ? ""
          : `Баланс: ${(user.balance || 0).toLocaleString()} ₽`;

        if (!guest && user.role === "admin") {
          profileRoleSpan.textContent = "Администратор";
          profileRoleSpan.style.display = "inline-block";
        } else {
          profileRoleSpan.style.display = "none";
        }

        document.getElementById("editName").value = user.name || "";
        document.getElementById("editEmail").value = user.email || "";
        document.getElementById("editPassword").value = "";
        document.getElementById("editAddress").value =
          user.shipping_address || "";
        document.getElementById("editNotifications").checked =
          user.notifications || false;

        setGuestUIState(guest);
        editForm.style.display = "none";
      }

      function showAuthPanel() {
        authCard.style.display = "block";
        profileCard.style.display = "none";

        document.getElementById("loginEmail").value = "";
        document.getElementById("loginPassword").value = "";
        document.getElementById("regName").value = "";
        document.getElementById("regEmail").value = "";
        document.getElementById("regPassword").value = "";
        document.getElementById("regConfirmPassword").value = "";
        document.getElementById("regAddress").value = "";

        clearMessages();
      }

      // ========== Бизнес-логика ==========
      async function handleLogin(email, password) {
        if (!email || !password) {
          showMessage(loginMessage, "Заполните все поля", "error");
          return false;
        }

        try {
          const res = await fetch(`${API_BASE}/api/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });
          const data = await res.json();
          if (!res.ok) {
            showMessage(
              loginMessage,
              data.error || "Неверный email или пароль",
              "error",
            );
            return false;
          }

          const sessionUser = { ...data, mode: USER_MODE.AUTH };
          setCurrentUser(sessionUser);
          showProfilePanel(sessionUser);
          return true;
        } catch (err) {
          showMessage(loginMessage, "Ошибка соединения с сервером", "error");
          return false;
        }
      }

      async function handleRegister(
        name,
        email,
        password,
        confirm,
        shippingAddress,
      ) {
        if (!name || !email || !password || !confirm || !shippingAddress) {
          showMessage(registerMessage, "Заполните все поля", "error");
          return false;
        }

        if (password !== confirm) {
          showMessage(registerMessage, "Пароли не совпадают", "error");
          return false;
        }

        if (password.length < 6) {
          showMessage(
            registerMessage,
            "Пароль должен быть не менее 6 символов",
            "error",
          );
          return false;
        }

        try {
          const res = await fetch(`${API_BASE}/api/auth/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name,
              email,
              password,
              shipping_address: shippingAddress,
            }),
          });
          const data = await res.json();
          if (!res.ok) {
            showMessage(
              registerMessage,
              data.error || "Ошибка регистрации",
              "error",
            );
            return false;
          }
          showMessage(
            registerMessage,
            "Регистрация успешна. Теперь войдите.",
            "success",
          );
        } catch (err) {
          showMessage(registerMessage, "Ошибка соединения с сервером", "error");
          return false;
        }

        setTimeout(() => {
          switchTab("login");
          document.getElementById("loginEmail").value = email;
          document.getElementById("loginPassword").value = "";
          clearMessages();
        }, 1200);

        return true;
      }

      function logout() {
        setCurrentUser(null);
        showAuthPanel();
        switchTab("login");
      }

      function toggleEditForm() {
        const currentUser = getCurrentUser();
        if (!currentUser || isGuestUser(currentUser)) return;
        editForm.style.display =
          editForm.style.display === "none" ? "block" : "none";
      }

      async function saveProfileChanges() {
        const currentUser = getCurrentUser();
        if (!currentUser || isGuestUser(currentUser)) {
          alert("Гостевой профиль нельзя редактировать");
          return;
        }

        const newName = document.getElementById("editName").value.trim();
        const newEmail = document.getElementById("editEmail").value.trim();
        const newPassword = document.getElementById("editPassword").value;
        const newAddress = document.getElementById("editAddress").value.trim();
        const notifications =
          document.getElementById("editNotifications").checked;

        if (!newName || !newEmail) {
          alert("Имя и email обязательны");
          return;
        }

        if (!newAddress) {
          alert("Адрес доставки обязателен");
          return;
        }

        const updatedData = {
          name: newName,
          email: newEmail,
          shipping_address: newAddress,
          notifications,
        };

        if (newPassword) {
          if (newPassword.length < 6) {
            alert("Новый пароль должен быть не менее 6 символов");
            return;
          }
          updatedData.password = newPassword;
        }

        try {
          const res = await fetch(
            `${API_BASE}/api/users/${encodeURIComponent(currentUser.email)}`,
            {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(updatedData),
            },
          );
          const data = await res.json();
          if (!res.ok) {
            alert(data.error || "Ошибка обновления");
            return;
          }
          const sessionUser = { ...data, mode: USER_MODE.AUTH };
          setCurrentUser(sessionUser);
          showProfilePanel(sessionUser);
          alert("Профиль успешно обновлён");
        } catch (err) {
          alert("Ошибка соединения с сервером");
        }
      }

      function enterGuestMode() {
        const guestUser = createGuestSession();
        setCurrentUser(guestUser);
        showProfilePanel(guestUser);
      }

      // ========== Тема ==========
      function applyTheme(theme) {
        if (theme === "dark") document.body.classList.add("dark");
        else document.body.classList.remove("dark");
        localStorage.setItem(THEME_KEY, theme);
      }

      function toggleTheme() {
        applyTheme(document.body.classList.contains("dark") ? "light" : "dark");
      }

      // ========== Обработчики ==========
      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        await handleLogin(
          document.getElementById("loginEmail").value.trim(),
          document.getElementById("loginPassword").value,
        );
      });

      registerForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        await handleRegister(
          document.getElementById("regName").value.trim(),
          document.getElementById("regEmail").value.trim(),
          document.getElementById("regPassword").value,
          document.getElementById("regConfirmPassword").value,
          document.getElementById("regAddress").value.trim(),
        );
      });

      tabBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          switchTab(btn.dataset.tab);
        });
      });

      guestLoginBtn.addEventListener("click", enterGuestMode);
      logoutBtn.addEventListener("click", logout);
      editProfileBtn.addEventListener("click", toggleEditForm);
      saveProfileChangesBtn.addEventListener("click", saveProfileChanges);

      cancelEditBtn.addEventListener("click", () => {
        editForm.style.display = "none";
        const user = getCurrentUser();
        if (user && !isGuestUser(user)) {
          document.getElementById("editName").value = user.name || "";
          document.getElementById("editEmail").value = user.email || "";
          document.getElementById("editPassword").value = "";
          document.getElementById("editAddress").value =
            user.shipping_address || "";
          document.getElementById("editNotifications").checked =
            user.notifications || false;
        }
      });

      topupBalanceBtn.addEventListener("click", () => {
        if (isGuestUser()) {
          alert("В гостевом режиме пополнение баланса недоступно");
          return;
        }
        // Перенаправляем на страницу пополнения баланса
        window.location.href = "balance.html";
      });

      goToShopBtn.addEventListener("click", () => {
        window.location.href = "shop.html";
      });

      themeToggle.addEventListener("click", toggleTheme);

      // ========== Инициализация ==========
      function init() {
        initUsers();

        const savedTheme = localStorage.getItem(THEME_KEY) || "light";
        applyTheme(savedTheme);

        const currentUser = getCurrentUser();
        if (currentUser) showProfilePanel(currentUser);
        else showAuthPanel();
      }

      init();
    </script>
  </body>
</html>
