<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LUXARY — Авторизация</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        :root {
            --bg-primary: #faf9f7;
            --bg-secondary: #ffffff;
            --text-primary: #1e1e2a;
            --text-secondary: #5a5a6e;
            --accent: #c9a03d;
            --accent-dark: #a87c2c;
            --border: rgba(0, 0, 0, 0.08);
            --shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: 1px solid rgba(255, 255, 255, 0.3);
            --input-bg: #fff;
        }
        body.dark {
            --bg-primary: #0a0a0f;
            --bg-secondary: #13131a;
            --text-primary: #f0f0f0;
            --text-secondary: #b0b0c0;
            --accent: #e6b422;
            --accent-dark: #c9991e;
            --border: rgba(255, 255, 255, 0.1);
            --shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.5);
            --glass-bg: rgba(10, 10, 20, 0.7);
            --glass-border: 1px solid rgba(230, 180, 34, 0.2);
            --input-bg: #1e1e2a;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: var(--glass-border);
        }
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-bottom: var(--glass-border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
            text-decoration: none;
        }
        .theme-toggle {
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            color: var(--accent);
        }
        .container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .auth-card {
            background: var(--bg-secondary);
            border-radius: 32px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
            backdrop-filter: blur(4px);
        }
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 1.2rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .tab-btn.active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
        }
        .form-pane {
            padding: 2rem;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .form-pane.active {
            display: block;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 40px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
        }
        .form-group input:focus {
            border-color: var(--accent);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #111;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(201, 160, 61, 0.3);
        }
        .btn-subtle {
            background: var(--bg-secondary);
            color: var(--accent);
            border: 1px solid var(--accent);
            box-shadow: none;
        }
        .btn-subtle:hover {
            background: rgba(201, 160, 61, 0.08);
            color: var(--accent);
            box-shadow: none;
        }
        body.dark .btn-subtle {
            background: var(--bg-secondary);
            color: var(--accent);
            border: 1px solid var(--accent);
        }
        .btn-ghost {
            margin-top: 0.75rem;
            background: transparent;
            color: var(--accent);
            border: none;
            box-shadow: none;
        }
        .btn-ghost:hover {
            background: transparent;
            color: var(--accent-dark);
            transform: none;
            box-shadow: none;
        }
        .message {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 40px;
            text-align: center;
            font-size: 0.9rem;
        }
        .message.error {
            background: rgba(231, 76, 60, 0.1);
            color: #e74c3c;
        }
        .message.success {
            background: rgba(46, 204, 113, 0.1);
            color: #2ecc71;
        }
        .profile-info {
            text-align: center;
            padding: 2rem;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--accent);
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
        }
        .profile-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .profile-email {
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        .profile-balance {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--accent);
            margin: 1rem 0;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--bg-secondary);
            max-width: 400px;
            width: 90%;
            border-radius: 32px;
            padding: 2rem;
            text-align: center;
        }
        .amount-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin: 1.5rem 0;
        }
        .amount-btn {
            background: var(--bg-primary);
            border: 1px solid var(--accent);
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }
        .amount-btn:hover {
            background: var(--accent);
            color: #111;
        }
        footer {
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            padding: 1.5rem;
            text-align: center;
            border-top: var(--glass-border);
            margin-top: auto;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 600px) {
            .container { padding: 1rem; }
            .form-pane { padding: 1.5rem; }
        }
    </style>
</head>
<body>
<header>
    <a href="index.html" class="logo">LUXARY</a>
    <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
</header>

<div class="container">
    <div class="auth-card" id="authCard">
        <div class="tabs">
            <button class="tab-btn active" data-tab="login">Вход</button>
            <button class="tab-btn" data-tab="register">Регистрация</button>
        </div>

        <div id="loginPane" class="form-pane active">
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" required placeholder="example@mail.com">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="loginPassword" required placeholder="••••••">
                </div>
                <button type="submit" class="btn btn-subtle">Войти</button>
                <button type="button" class="btn btn-ghost" id="guestLoginBtn">Войти как гость</button>
                <div id="loginMessage" class="message"></div>
            </form>
        </div>

        <div id="registerPane" class="form-pane">
            <form id="registerForm">
                <div class="form-group">
                    <label>Полное имя</label>
                    <input type="text" id="regName" required placeholder="Иван Петров">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" required placeholder="ivan@example.com">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="regPassword" required placeholder="минимум 6 символов">
                </div>
                <div class="form-group">
                    <label>Подтверждение пароля</label>
                    <input type="password" id="regConfirmPassword" required placeholder="повторите пароль">
                </div>
                <button type="submit" class="btn">Зарегистрироваться</button>
                <div id="registerMessage" class="message"></div>
            </form>
        </div>
    </div>

    <div id="profileCard" class="auth-card" style="display: none;">
        <div class="profile-info">
            <div class="avatar"><i class="fas fa-user"></i></div>
            <div class="profile-name" id="profileName"></div>
            <div class="profile-email" id="profileEmail"></div>
            <div class="profile-balance" id="profileBalance">Баланс: 0 ₽</div>
            <button id="topupBalanceBtn" class="btn" style="background: transparent; border: 1px solid var(--accent); color: var(--accent); margin-bottom: 1rem;">Пополнить баланс</button>
            <button id="goToShopBtn" class="btn" style="margin-bottom: 1rem;">Перейти в магазин</button>
            <button id="editProfileBtn" class="btn" style="background: transparent; border: 1px solid var(--accent); color: var(--accent);">Редактировать профиль</button>
            <button id="logoutBtn" class="btn" style="margin-top: 1rem;">Выйти</button>
        </div>

        <div id="editForm" style="display: none; margin-top: 1rem; padding: 1rem 2rem 2rem; border-top: 1px solid var(--border);">
            <div class="form-group">
                <label>Имя</label>
                <input type="text" id="editName">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="editEmail">
            </div>
            <div class="form-group">
                <label>Новый пароль (оставьте пустым, если не менять)</label>
                <input type="password" id="editPassword">
            </div>
            <div class="form-group">
                <label><input type="checkbox" id="editNotifications"> Получать уведомления</label>
            </div>
            <button id="saveProfileChangesBtn" class="btn">Сохранить</button>
            <button id="cancelEditBtn" class="btn-outline" style="background: none; border: 1px solid var(--border); margin-top: 0.5rem; width: 100%; padding: 12px 24px; border-radius: 40px; cursor: pointer; color: var(--text-primary);">Отмена</button>
        </div>
    </div>
</div>

<footer>
    <p>© 2025 Luxary — Премиальный маркетплейс</p>
</footer>

<script>
    const USERS_KEY = 'luxary_users';
    const CURRENT_USER_KEY = 'luxary_current_user';
    const THEME_KEY = 'luxary_theme';

    function initUsers() {
        if (!localStorage.getItem(USERS_KEY)) {
            const demoUser = {
                name: 'Алексей Смирнов',
                email: 'admin@example.com',
                password: '123456',
                balance: 500000,
                notifications: true,
                createdAt: new Date().toISOString()
            };
            localStorage.setItem(USERS_KEY, JSON.stringify([demoUser]));
        } else {
            const users = getUsers();
            let updated = false;
            const newUsers = users.map(u => {
                if (u.balance === undefined) {
                    updated = true;
                    return { ...u, balance: 500000 };
                }
                return u;
            });
            if (updated) saveUsers(newUsers);
        }
    }

    function getUsers() {
        return JSON.parse(localStorage.getItem(USERS_KEY)) || [];
    }

    function saveUsers(users) {
        localStorage.setItem(USERS_KEY, JSON.stringify(users));
    }

    function findUserByEmail(email) {
        return getUsers().find(u => u.email === email);
    }

    function addUser(user) {
        const users = getUsers();
        if (users.some(u => u.email === user.email)) return false;
        users.push(user);
        saveUsers(users);
        return true;
    }

    function updateUser(email, updatedData) {
        const users = getUsers();
        const index = users.findIndex(u => u.email === email);
        if (index === -1) return false;
        users[index] = { ...users[index], ...updatedData };
        saveUsers(users);
        return true;
    }

    function getCurrentUser() {
        const userJson = localStorage.getItem(CURRENT_USER_KEY);
        return userJson ? JSON.parse(userJson) : null;
    }

    function setCurrentUser(user) {
        if (user) {
            localStorage.setItem(CURRENT_USER_KEY, JSON.stringify(user));
        } else {
            localStorage.removeItem(CURRENT_USER_KEY);
        }
    }

    const authCard = document.getElementById('authCard');
    const profileCard = document.getElementById('profileCard');
    const loginPane = document.getElementById('loginPane');
    const registerPane = document.getElementById('registerPane');
    const tabBtns = document.querySelectorAll('.tab-btn');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const loginMessage = document.getElementById('loginMessage');
    const registerMessage = document.getElementById('registerMessage');
    const editProfileBtn = document.getElementById('editProfileBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const editForm = document.getElementById('editForm');
    const saveProfileChangesBtn = document.getElementById('saveProfileChangesBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const profileNameSpan = document.getElementById('profileName');
    const profileEmailSpan = document.getElementById('profileEmail');
    const profileBalanceSpan = document.getElementById('profileBalance');
    const topupBalanceBtn = document.getElementById('topupBalanceBtn');
    const goToShopBtn = document.getElementById('goToShopBtn');
    const guestLoginBtn = document.getElementById('guestLoginBtn');

    function switchTab(tabId) {
        if (tabId === 'login') {
            loginPane.classList.add('active');
            registerPane.classList.remove('active');
            tabBtns[0].classList.add('active');
            tabBtns[1].classList.remove('active');
        } else {
            registerPane.classList.add('active');
            loginPane.classList.remove('active');
            tabBtns[1].classList.add('active');
            tabBtns[0].classList.remove('active');
        }
        clearMessages();
    }

    tabBtns.forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    function clearMessages() {
        loginMessage.innerHTML = '';
        registerMessage.innerHTML = '';
        loginMessage.className = 'message';
        registerMessage.className = 'message';
    }

    function showMessage(element, text, type) {
        element.innerHTML = text;
        element.className = `message ${type}`;
        setTimeout(() => {
            if (element.innerHTML === text) {
                element.innerHTML = '';
                element.className = 'message';
            }
        }, 3000);
    }

    function handleLogin(email, password) {
        if (!email || !password) {
            showMessage(loginMessage, 'Заполните все поля', 'error');
            return false;
        }
        const user = findUserByEmail(email);
        if (!user || user.password !== password) {
            showMessage(loginMessage, 'Неверный email или пароль', 'error');
            return false;
        }
        setCurrentUser(user);
        showProfilePanel(user);
        showMessage(loginMessage, 'Вход выполнен успешно!', 'success');
        return true;
    }

    function handleRegister(name, email, password, confirm) {
        if (!name || !email || !password || !confirm) {
            showMessage(registerMessage, 'Заполните все поля', 'error');
            return false;
        }
        if (password !== confirm) {
            showMessage(registerMessage, 'Пароли не совпадают', 'error');
            return false;
        }
        if (password.length < 6) {
            showMessage(registerMessage, 'Пароль должен быть не менее 6 символов', 'error');
            return false;
        }
        if (findUserByEmail(email)) {
            showMessage(registerMessage, 'Пользователь с таким email уже существует', 'error');
            return false;
        }
        const newUser = {
            name,
            email,
            password,
            balance: 500000,
            notifications: false,
            createdAt: new Date().toISOString()
        };
        if (addUser(newUser)) {
            showMessage(registerMessage, 'Регистрация успешна! Теперь войдите.', 'success');
            setTimeout(() => {
                switchTab('login');
                document.getElementById('loginEmail').value = email;
                document.getElementById('loginPassword').value = '';
                clearMessages();
            }, 1500);
            return true;
        }
        return false;
    }

    function showProfilePanel(user) {
        authCard.style.display = 'none';
        profileCard.style.display = 'block';
        profileNameSpan.innerText = user.name;
        profileEmailSpan.innerText = user.email;
        profileBalanceSpan.innerText = `Баланс: ${(user.balance || 0).toLocaleString()} ₽`;
        document.getElementById('editName').value = user.name || '';
        document.getElementById('editEmail').value = user.email || '';
        document.getElementById('editPassword').value = '';
        document.getElementById('editNotifications').checked = user.notifications || false;
        editForm.style.display = 'none';
    }

    function showAuthPanel() {
        authCard.style.display = 'block';
        profileCard.style.display = 'none';
        document.getElementById('loginEmail').value = '';
        document.getElementById('loginPassword').value = '';
        document.getElementById('regName').value = '';
        document.getElementById('regEmail').value = '';
        document.getElementById('regPassword').value = '';
        document.getElementById('regConfirmPassword').value = '';
        clearMessages();
    }

    function logout() {
        setCurrentUser(null);
        showAuthPanel();
        switchTab('login');
    }

    function toggleEditForm() {
        editForm.style.display = editForm.style.display === 'none' ? 'block' : 'none';
    }

    function saveProfileChanges() {
        const currentUser = getCurrentUser();
        if (!currentUser) return;

        if (currentUser.isGuest) {
            alert('Гостевой профиль нельзя редактировать');
            return;
        }

        const newName = document.getElementById('editName').value.trim();
        const newEmail = document.getElementById('editEmail').value.trim();
        const newPassword = document.getElementById('editPassword').value;
        const notifications = document.getElementById('editNotifications').checked;

        if (!newName || !newEmail) {
            alert('Имя и email обязательны');
            return;
        }

        if (newEmail !== currentUser.email) {
            const existing = findUserByEmail(newEmail);
            if (existing && existing.email !== currentUser.email) {
                alert('Этот email уже используется другим пользователем');
                return;
            }
        }

        const updatedData = { name: newName, email: newEmail, notifications };
        if (newPassword) {
            if (newPassword.length < 6) {
                alert('Новый пароль должен быть не менее 6 символов');
                return;
            }
            updatedData.password = newPassword;
        }

        if (updateUser(currentUser.email, updatedData)) {
            const updatedUser = findUserByEmail(newEmail);
            setCurrentUser(updatedUser);
            showProfilePanel(updatedUser);
            alert('Профиль успешно обновлён');
        } else {
            alert('Ошибка обновления');
        }
    }

    function applyTheme(theme) {
        if (theme === 'dark') document.body.classList.add('dark');
        else document.body.classList.remove('dark');
        localStorage.setItem(THEME_KEY, theme);
    }

    function toggleTheme() {
        const isDark = document.body.classList.contains('dark');
        applyTheme(isDark ? 'light' : 'dark');
    }

    loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        handleLogin(
            document.getElementById('loginEmail').value.trim(),
            document.getElementById('loginPassword').value
        );
    });

    registerForm.addEventListener('submit', (e) => {
        e.preventDefault();
        handleRegister(
            document.getElementById('regName').value.trim(),
            document.getElementById('regEmail').value.trim(),
            document.getElementById('regPassword').value,
            document.getElementById('regConfirmPassword').value
        );
    });

    guestLoginBtn.addEventListener('click', () => {
        const guestUser = {
            name: 'Гость',
            email: 'guest@luxary.local',
            password: '',
            balance: 0,
            notifications: false,
            createdAt: new Date().toISOString(),
            isGuest: true
        };
        setCurrentUser(guestUser);
        showProfilePanel(guestUser);
    });

    logoutBtn.addEventListener('click', logout);
    editProfileBtn.addEventListener('click', toggleEditForm);

    saveProfileChangesBtn.addEventListener('click', saveProfileChanges);

    cancelEditBtn.addEventListener('click', () => {
        editForm.style.display = 'none';
        const user = getCurrentUser();
        if (user) {
            document.getElementById('editName').value = user.name;
            document.getElementById('editEmail').value = user.email;
            document.getElementById('editPassword').value = '';
            document.getElementById('editNotifications').checked = user.notifications || false;
        }
    });

    topupBalanceBtn.addEventListener('click', () => {
        window.location.href = 'balance.html';
    });

    goToShopBtn.addEventListener('click', () => {
        window.location.href = 'shop.html';
    });

    const themeToggle = document.getElementById('themeToggle');
    themeToggle.addEventListener('click', toggleTheme);

    function init() {
        initUsers();
        const savedTheme = localStorage.getItem(THEME_KEY) || 'light';
        applyTheme(savedTheme);
        const currentUser = getCurrentUser();
        if (currentUser) {
            showProfilePanel(currentUser);
        } else {
            showAuthPanel();
        }
    }

    init();
</script>
</body>
</html>
